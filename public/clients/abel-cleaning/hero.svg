<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="800" viewBox="0 0 1440 800">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="50%"  stop-color="#F0FAF4"/>
      <stop offset="100%" stop-color="#D4EEE0"/>
    </linearGradient>
    <radialGradient id="bubble1" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#1B7A4A" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#1B7A4A" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bubble2" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#2EA05F" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#2EA05F" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1440" height="800" fill="url(#bg)"/>

  <!-- Soft sweep accent -->
  <ellipse cx="1200" cy="400" rx="700" ry="500" fill="#1B7A4A" fill-opacity="0.04"/>
  <ellipse cx="1300" cy="200" rx="400" ry="300" fill="#1B7A4A" fill-opacity="0.05"/>

  <!-- Large soap bubbles -->
  <circle cx="1050" cy="200" r="220" fill="url(#bubble1)" stroke="#1B7A4A" stroke-width="1" stroke-opacity="0.12"/>
  <circle cx="1050" cy="200" r="218" fill="none" stroke="white" stroke-width="1.5" stroke-opacity="0.5"/>

  <circle cx="1300" cy="500" r="180" fill="url(#bubble2)" stroke="#2EA05F" stroke-width="1" stroke-opacity="0.10"/>
  <circle cx="1300" cy="500" r="178" fill="none" stroke="white" stroke-width="1" stroke-opacity="0.4"/>

  <circle cx="800"  cy="600" r="130" fill="url(#bubble1)" stroke="#1B7A4A" stroke-width="1" stroke-opacity="0.10"/>
  <circle cx="800"  cy="600" r="128" fill="none" stroke="white" stroke-width="1" stroke-opacity="0.4"/>

  <!-- Medium bubbles -->
  <circle cx="1380" cy="150" r="90"  fill="none" stroke="#1B7A4A" stroke-width="1.2" stroke-opacity="0.14"/>
  <circle cx="920"  cy="680" r="80"  fill="none" stroke="#2EA05F" stroke-width="1" stroke-opacity="0.13"/>
  <circle cx="680"  cy="100" r="70"  fill="none" stroke="#1B7A4A" stroke-width="1" stroke-opacity="0.12"/>
  <circle cx="1180" cy="720" r="60"  fill="#1B7A4A" fill-opacity="0.05" stroke="#1B7A4A" stroke-width="1" stroke-opacity="0.10"/>

  <!-- Small accent bubbles -->
  <circle cx="760"  cy="320" r="36" fill="none" stroke="#1B7A4A" stroke-width="1.5" stroke-opacity="0.16"/>
  <circle cx="1420" cy="380" r="28" fill="#1B7A4A" fill-opacity="0.07"/>
  <circle cx="580"  cy="680" r="22" fill="none" stroke="#2EA05F" stroke-width="1.5" stroke-opacity="0.18"/>
  <circle cx="1100" cy="56"  r="18" fill="#1B7A4A" fill-opacity="0.09"/>
  <circle cx="860"  cy="760" r="14" fill="none" stroke="#1B7A4A" stroke-width="1.5" stroke-opacity="0.20"/>
  <circle cx="1250" cy="340" r="12" fill="#2EA05F" fill-opacity="0.12"/>

  <!-- Sparkle dots (clean feel) -->
  <circle cx="990"  cy="130" r="4"  fill="#1B7A4A" fill-opacity="0.25"/>
  <circle cx="1010" cy="148" r="2.5" fill="#1B7A4A" fill-opacity="0.18"/>
  <circle cx="974"  cy="152" r="2"  fill="#1B7A4A" fill-opacity="0.15"/>

  <circle cx="1240" cy="460" r="4"  fill="#2EA05F" fill-opacity="0.22"/>
  <circle cx="1258" cy="476" r="2.5" fill="#2EA05F" fill-opacity="0.16"/>

  <!-- Sweeping clean stroke (mop arc suggestion) -->
  <path d="M 600 750 Q 900 500 1350 380" fill="none" stroke="#1B7A4A" stroke-width="2" stroke-opacity="0.08" stroke-linecap="round"/>
  <path d="M 620 780 Q 920 520 1360 400" fill="none" stroke="#1B7A4A" stroke-width="1" stroke-opacity="0.05" stroke-linecap="round"/>

  <!-- Highlight shimmer on large bubble -->
  <ellipse cx="980" cy="148" rx="40" ry="20" fill="white" fill-opacity="0.18" transform="rotate(-30 980 148)"/>
  <ellipse cx="1234" cy="448" rx="30" ry="15" fill="white" fill-opacity="0.14" transform="rotate(-25 1234 448)"/>
</svg>
