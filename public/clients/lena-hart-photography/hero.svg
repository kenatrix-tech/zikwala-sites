<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="800" viewBox="0 0 1440 800">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#141414"/>
      <stop offset="50%"  stop-color="#1C1C1C"/>
      <stop offset="100%" stop-color="#242424"/>
    </linearGradient>
    <radialGradient id="bokeh1" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#C9A84C" stop-opacity="0.28"/>
      <stop offset="60%"  stop-color="#C9A84C" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#C9A84C" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bokeh2" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#E8C97A" stop-opacity="0.20"/>
      <stop offset="60%"  stop-color="#E8C97A" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#E8C97A" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bokeh3" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#C9A84C" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#C9A84C" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1440" height="800" fill="url(#bg)"/>

  <!-- Large camera lens circle -->
  <circle cx="1100" cy="380" r="280" fill="none" stroke="#C9A84C" stroke-width="1.5" stroke-opacity="0.14"/>
  <circle cx="1100" cy="380" r="250" fill="none" stroke="#C9A84C" stroke-width="1"   stroke-opacity="0.10"/>
  <circle cx="1100" cy="380" r="210" fill="none" stroke="#C9A84C" stroke-width="1"   stroke-opacity="0.08"/>
  <circle cx="1100" cy="380" r="160" fill="none" stroke="#C9A84C" stroke-width="2"   stroke-opacity="0.16"/>
  <circle cx="1100" cy="380" r="110" fill="none" stroke="#C9A84C" stroke-width="1"   stroke-opacity="0.12"/>
  <circle cx="1100" cy="380" r="60"  fill="none" stroke="#C9A84C" stroke-width="1.5" stroke-opacity="0.18"/>
  <circle cx="1100" cy="380" r="20"  fill="#C9A84C" fill-opacity="0.15"/>

  <!-- Lens aperture blades (octagon) -->
  <polygon points="1100,170 1180,210 1210,300 1190,390 1140,450 1060,450 1010,390 990,300 1020,210"
           fill="none" stroke="#C9A84C" stroke-width="1" stroke-opacity="0.10"/>

  <!-- Bokeh circles (out of focus lights) -->
  <circle cx="800"  cy="200" r="80"  fill="url(#bokeh1)" stroke="#C9A84C" stroke-width="1" stroke-opacity="0.20"/>
  <circle cx="1350" cy="150" r="100" fill="url(#bokeh2)" stroke="#E8C97A" stroke-width="1" stroke-opacity="0.16"/>
  <circle cx="680"  cy="600" r="70"  fill="url(#bokeh1)" stroke="#C9A84C" stroke-width="1" stroke-opacity="0.18"/>
  <circle cx="1350" cy="620" r="90"  fill="url(#bokeh2)" stroke="#E8C97A" stroke-width="1" stroke-opacity="0.14"/>
  <circle cx="950"  cy="680" r="60"  fill="url(#bokeh3)" stroke="#C9A84C" stroke-width="1" stroke-opacity="0.16"/>
  <circle cx="1420" cy="420" r="50"  fill="url(#bokeh1)" stroke="#C9A84C" stroke-width="1" stroke-opacity="0.18"/>
  <circle cx="760"  cy="80"  r="44"  fill="url(#bokeh2)"/>
  <circle cx="1240" cy="720" r="40"  fill="url(#bokeh1)"/>
  <circle cx="580"  cy="400" r="36"  fill="url(#bokeh3)" stroke="#C9A84C" stroke-width="1" stroke-opacity="0.14"/>

  <!-- Small bokeh dots -->
  <circle cx="640"  cy="160" r="16" fill="#C9A84C" fill-opacity="0.18"/>
  <circle cx="900"  cy="100" r="12" fill="#E8C97A" fill-opacity="0.16"/>
  <circle cx="1180" cy="680" r="14" fill="#C9A84C" fill-opacity="0.16"/>
  <circle cx="1080" cy="740" r="10" fill="#E8C97A" fill-opacity="0.14"/>
  <circle cx="520"  cy="500" r="10" fill="#C9A84C" fill-opacity="0.14"/>
  <circle cx="1380" cy="320" r="8"  fill="#C9A84C" fill-opacity="0.20"/>
  <circle cx="700"  cy="720" r="8"  fill="#E8C97A" fill-opacity="0.18"/>
  <circle cx="860"  cy="740" r="6"  fill="#C9A84C" fill-opacity="0.22"/>
  <circle cx="1300" cy="80"  r="6"  fill="#E8C97A" fill-opacity="0.20"/>

  <!-- Gold sparkle points -->
  <circle cx="1040" cy="330" r="3"  fill="#C9A84C" fill-opacity="0.50"/>
  <circle cx="1160" cy="430" r="3"  fill="#C9A84C" fill-opacity="0.45"/>
  <circle cx="1090" cy="300" r="2"  fill="#E8C97A" fill-opacity="0.55"/>
  <circle cx="1120" cy="460" r="2"  fill="#E8C97A" fill-opacity="0.50"/>

  <!-- Light ray from lens center -->
  <line x1="1100" y1="380" x2="760"  y2="200" stroke="#C9A84C" stroke-width="1" stroke-opacity="0.06"/>
  <line x1="1100" y1="380" x2="820"  y2="600" stroke="#C9A84C" stroke-width="1" stroke-opacity="0.06"/>
  <line x1="1100" y1="380" x2="1380" y2="200" stroke="#C9A84C" stroke-width="1" stroke-opacity="0.05"/>
  <line x1="1100" y1="380" x2="1400" y2="580" stroke="#C9A84C" stroke-width="1" stroke-opacity="0.05"/>
  <line x1="1100" y1="380" x2="1100" y2="80"  stroke="#C9A84C" stroke-width="1" stroke-opacity="0.05"/>
  <line x1="1100" y1="380" x2="1100" y2="700" stroke="#C9A84C" stroke-width="1" stroke-opacity="0.05"/>

  <!-- Lens highlight -->
  <ellipse cx="1048" cy="316" rx="40" ry="20" fill="white" fill-opacity="0.07" transform="rotate(-35 1048 316)"/>
</svg>
