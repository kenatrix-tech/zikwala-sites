<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="800" viewBox="0 0 1440 800">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#FFF8FC"/>
      <stop offset="50%"  stop-color="#FDF0F7"/>
      <stop offset="100%" stop-color="#F7D9EC"/>
    </linearGradient>
    <radialGradient id="blush1" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#A0537E" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#A0537E" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blush2" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#C97FAA" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#C97FAA" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1440" height="800" fill="url(#bg)"/>

  <!-- Large soft blush circles -->
  <circle cx="1150" cy="300" r="300" fill="url(#blush1)"/>
  <circle cx="900"  cy="600" r="220" fill="url(#blush2)"/>
  <circle cx="1350" cy="650" r="180" fill="url(#blush1)"/>

  <!-- Elegant outline rings -->
  <circle cx="1150" cy="300" r="280" fill="none" stroke="#A0537E" stroke-width="1"   stroke-opacity="0.10"/>
  <circle cx="1150" cy="300" r="240" fill="none" stroke="#A0537E" stroke-width="1"   stroke-opacity="0.08"/>
  <circle cx="1150" cy="300" r="190" fill="none" stroke="#A0537E" stroke-width="1.5" stroke-opacity="0.12"/>

  <circle cx="1350" cy="580" r="160" fill="none" stroke="#C97FAA" stroke-width="1"   stroke-opacity="0.12"/>
  <circle cx="1350" cy="580" r="120" fill="none" stroke="#C97FAA" stroke-width="1"   stroke-opacity="0.09"/>

  <circle cx="700"  cy="680" r="120" fill="none" stroke="#A0537E" stroke-width="1"   stroke-opacity="0.10"/>
  <circle cx="700"  cy="680" r="86"  fill="none" stroke="#A0537E" stroke-width="1"   stroke-opacity="0.08"/>

  <!-- Flowing curved lines (elegance) -->
  <path d="M 500 600 C 700 400 900 600 1100 300 S 1300 100 1440 200"
        fill="none" stroke="#A0537E" stroke-width="1.5" stroke-opacity="0.08" stroke-linecap="round"/>
  <path d="M 500 640 C 700 440 900 640 1100 340 S 1300 140 1440 240"
        fill="none" stroke="#A0537E" stroke-width="1"   stroke-opacity="0.05" stroke-linecap="round"/>
  <path d="M 600 800 C 800 600 1000 700 1200 450 S 1380 300 1440 350"
        fill="none" stroke="#C97FAA" stroke-width="1"   stroke-opacity="0.07" stroke-linecap="round"/>

  <!-- Petal shapes (abstract flower) -->
  <ellipse cx="1150" cy="220" rx="30" ry="60" fill="#A0537E" fill-opacity="0.06" transform="rotate(0  1150 300)"/>
  <ellipse cx="1150" cy="220" rx="30" ry="60" fill="#A0537E" fill-opacity="0.06" transform="rotate(45 1150 300)"/>
  <ellipse cx="1150" cy="220" rx="30" ry="60" fill="#A0537E" fill-opacity="0.06" transform="rotate(90 1150 300)"/>
  <ellipse cx="1150" cy="220" rx="30" ry="60" fill="#A0537E" fill-opacity="0.06" transform="rotate(135 1150 300)"/>
  <circle  cx="1150" cy="300" r="24" fill="#A0537E" fill-opacity="0.08"/>

  <!-- Small glitter dots -->
  <circle cx="1060" cy="180" r="3.5" fill="#A0537E" fill-opacity="0.30"/>
  <circle cx="1080" cy="196" r="2"   fill="#A0537E" fill-opacity="0.22"/>
  <circle cx="1044" cy="198" r="2"   fill="#A0537E" fill-opacity="0.18"/>
  <circle cx="1240" cy="260" r="3.5" fill="#C97FAA" fill-opacity="0.28"/>
  <circle cx="1260" cy="278" r="2"   fill="#C97FAA" fill-opacity="0.20"/>
  <circle cx="820"  cy="560" r="3"   fill="#A0537E" fill-opacity="0.24"/>
  <circle cx="840"  cy="576" r="2"   fill="#A0537E" fill-opacity="0.18"/>
  <circle cx="1380" cy="480" r="4"   fill="#C97FAA" fill-opacity="0.20"/>
  <circle cx="660"  cy="580" r="3"   fill="#A0537E" fill-opacity="0.22"/>

  <!-- Highlight shimmer -->
  <ellipse cx="1080" cy="230" rx="36" ry="18" fill="white" fill-opacity="0.22" transform="rotate(-20 1080 230)"/>
  <ellipse cx="1290" cy="520" rx="28" ry="14" fill="white" fill-opacity="0.16" transform="rotate(-15 1290 520)"/>
</svg>
